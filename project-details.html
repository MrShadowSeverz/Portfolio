<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Abhilash Saji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* --- RESTORED ORIGINAL COLOR THEME --- */
            --bg-dark: #02080c;
            --bg-card: rgba(4, 18, 25, 0.8); /* Original transparent black */
            --primary-green: #00ff66; /* Original Green */
            --text-main: #ffffff;
            --text-muted: #8da4ae;
            --border-color: rgba(0, 255, 102, 0.15); /* Original Green Border */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            padding-top: 80px;
            position: relative;
            min-height: 100vh;
        }
        
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        /* --- BACKGROUND MANAGEMENT --- */
        #dynamic-bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.25);
            transform: scale(1.05);
            z-index: -2;
            transition: background-image 0.5s ease;
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100vh;
            top: 0; left: 0; z-index: -1;
            pointer-events: none;
        }

        /* --- NAVIGATION HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 6%; background: rgba(2, 8, 12, 0.85); backdrop-filter: blur(16px);
            position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 1.5px; }
        .logo i { color: var(--primary-green); }
        
        .btn-go-back-nav {
            border: 1px solid var(--primary-green); background: rgba(0, 255, 102, 0.05); color: var(--primary-green);
            padding: 8px 18px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .btn-go-back-nav:hover { background: var(--primary-green); color: var(--bg-dark); }

        /* --- BENTO GRID LAYOUT CONTAINER --- */
        .bento-container { max-width: 1400px; margin: 0 auto; padding: 20px 6% 60px; position: relative; z-index: 5; }
        
        .breadcrumb {
            font-size: 0.8rem; color: var(--text-muted); margin-bottom: 25px;
            display: flex; align-items: center; gap: 8px;
        }
        .breadcrumb span { color: var(--text-main); font-weight: 600; }

        /* HERO TOP SECTION */
        .hero-bento { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; align-items: stretch; }
        
        .hero-left-card { display: flex; flex-direction: column; justify-content: center; }
        .proj-tag-badge { border-radius: 4px; font-size: 0.65rem; padding: 4px 10px; font-weight: 700; text-transform: uppercase; width: fit-content; margin-bottom: 15px; border: 1px solid var(--primary-green); color: var(--primary-green); background: rgba(0,255,102,0.05); }
        .proj-title { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; text-transform: uppercase; color: #ffffff; margin-bottom: 15px; line-height: 1.1; display: flex; align-items: center; gap: 15px; }
        .brief-text-desc { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; max-width: 90%; }
        
        .hero-action-row { display: flex; gap: 15px; margin-bottom: 40px; }
        
        /* RESTORED GREEN BUTTON */
        .btn-main-play { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 14px 28px; border-radius: 6px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; background: var(--primary-green); color: var(--bg-dark); border: none; cursor: pointer; transition: 0.3s; }
        .btn-main-play:hover { box-shadow: 0 0 20px rgba(0, 255, 102, 0.4); transform: translateY(-2px); }
        
        .btn-outline { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 14px 28px; border-radius: 6px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; background: transparent; border: 1px solid var(--text-main); color: var(--text-main); cursor: pointer; transition: 0.3s; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        /* Mini Features Row in Hero */
        .mini-features-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .mini-feature-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 90px; text-align: center; }
        .mini-feature-box i { font-size: 1.2rem; color: var(--primary-green); }
        .mini-feature-box span { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; line-height: 1.2; }

        /* STEAM MEDIA SLIDER (Right Side) */
        .steam-media-wrapper { display: flex; flex-direction: column; gap: 12px; }
        .video-player-frame { width: 100%; height: 380px; border-radius: 12px; background: #000; overflow: hidden; border: 1px solid var(--border-color); position: relative; }
        .video-player-frame iframe, .video-player-frame img { width: 100%; height: 100%; border: none; object-fit: cover; }
        
        .slider-relative-tray { position: relative; display: flex; align-items: center; width: 100%; padding: 0 35px; }
        .steam-thumbnail-slider { display: flex; gap: 12px; overflow-x: hidden; scroll-behavior: smooth; width: 100%; }
        .steam-thumb { flex: 0 0 calc(25% - 9px); height: 75px; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; background: #000; opacity: 0.5; transition: 0.3s; }
        .steam-thumb:hover, .steam-thumb.active { opacity: 1; border-color: var(--primary-green); }
        .steam-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .steam-thumb-overlay-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--primary-green); font-size: 1.2rem; }
        .slider-arrow { background: rgba(2, 8, 12, 0.9); border: 1px solid var(--border-color); color: #ffffff; position: absolute; top: 0; bottom: 0; width: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; font-size: 0.8rem; height: 75px; border-radius: 8px; }
        .slider-arrow:hover { color: var(--primary-green); border-color: var(--primary-green); }
        .arrow-left { left: 0; }
        .arrow-right { right: 0; }

        /* --- BENTO CONTENT SECTIONS --- */
        .bento-main-grid { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 25px; align-items: start; margin-bottom: 25px;}
        
        .bento-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; backdrop-filter: blur(8px); }
        .bento-card-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; text-transform: uppercase; color: #ffffff; margin-bottom: 20px; letter-spacing: 0.5px; border-bottom: 1px solid rgba(0, 255, 102, 0.2); padding-bottom: 12px; }
        
        .bento-card p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 15px; }
        .bento-card p strong { color: var(--text-main); }

        /* Technical Highlights Grid */
        .tech-highlights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .highlight-item { border: 1px solid rgba(0, 255, 102, 0.1); background: rgba(0,0,0,0.2); padding: 18px; border-radius: 8px; display: flex; gap: 15px; align-items: center; }
        .highlight-item i { font-size: 1.5rem; color: #bb55ff; }
        .highlight-item h5 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: #fff; margin-bottom: 4px; }
        .highlight-item p { font-size: 0.75rem; margin-bottom: 0; line-height: 1.4; }

        /* Key Features List */
        .feature-list-check { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .feature-list-check li { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: var(--text-muted); }
        .feature-list-check li i { color: #ff9900; font-size: 1.1rem; }

        /* Challenges List (Static Layout for Demo) */
        .challenges-list { display: flex; flex-direction: column; gap: 10px; }
        .challenge-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid rgba(0, 255, 102, 0.1); }
        .challenge-row p { margin: 0; font-size: 0.8rem; }
        .c-arrow { color: var(--text-muted); font-size: 0.8rem; }

        /* Metrics Grid */
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .metric-box { text-align: center; border-right: 1px solid rgba(0, 255, 102, 0.15); }
        .metric-box:last-child { border: none; }
        .metric-box h3 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: #fff; margin-bottom: 5px; }
        .metric-box p { font-size: 0.75rem; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary-green); }

        /* Development Process (Static Layout) */
        .dev-process-row { display: flex; justify-content: space-between; position: relative; margin-top: 15px; padding-top: 20px; }
        .dev-process-row::before { content: ''; position: absolute; top: 38px; left: 5%; right: 5%; height: 1px; border-top: 1px dashed rgba(0, 255, 102, 0.3); z-index: 0; }
        .process-step { display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 1; gap: 10px; width: 15%; }
        .step-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-dark); border: 2px solid var(--primary-green); display: flex; align-items: center; justify-content: center; color: var(--primary-green); }
        .process-step h5 { font-size: 0.75rem; color: #fff; margin:0; }
        .process-step p { font-size: 0.65rem; margin:0; line-height: 1.2; }

        /* Colored Icons matching the image */
        .c-blue { color: #33a6ff !important; border-color: #33a6ff !important; }
        .c-purple { color: #bb55ff !important; border-color: #bb55ff !important; }
        .c-green { color: #00ffbc !important; border-color: #00ffbc !important; }
        .c-orange { color: #ffcc00 !important; border-color: #ffcc00 !important; }
        .c-pink { color: #ff4d79 !important; border-color: #ff4d79 !important; }
        .c-red { color: #ff3344 !important; border-color: #ff3344 !important; }

        /* Bottom CTA Bar */
        .bottom-cta-bar { background: var(--bg-card); backdrop-filter: blur(8px); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        .cta-quote { display: flex; gap: 15px; align-items: center; }
        .cta-quote i { font-size: 2rem; color: var(--primary-green); }
        .cta-quote p { font-size: 1.1rem; color: #fff; font-style: italic; max-width: 400px; line-height: 1.4; margin:0; }
        
        .cta-links { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .cta-links span { font-size: 0.85rem; color: var(--text-muted); }
        .link-row { display: flex; gap: 15px; }
        .link-row a { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #fff; background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .link-row a:hover { background: rgba(0,255,102,0.1); border-color: var(--primary-green); color: var(--primary-green); }

        /* Tag Colors Updated */
        .tag-green { border: 1px solid #00ff66; color: #00ff66; }
        .tag-cyanBlue { border: 1px solid #00d4ff; color: #00d4ff; }
        .color-cyanBlue { color: #00d4ff; }

        @media (max-width: 1024px) {
            .hero-bento, .bento-main-grid { grid-template-columns: 1fr; }
            .tech-highlights-grid { grid-template-columns: 1fr; }
            .challenge-row { grid-template-columns: 1fr; text-align: center; }
            .c-arrow { display: none; }
            .bottom-cta-bar { flex-direction: column; text-align: center; gap: 20px; }
            .cta-links { align-items: center; }
            .metrics-grid { grid-template-columns: 1fr 1fr; gap: 20px; }
            .metric-box { border: none; }
        }
    </style>
</head>
<body>

    <div id="dynamic-bg-blur"></div>
    <div id="particles-js"></div>

    <header>
        <div class="logo"><i class="fa-solid fa-gamepad"></i> ABHILASH SAJI</div>
        <a href="projects.html" class="btn-go-back-nav">Back to Projects</a>
    </header>

    <main class="bento-container" id="details-root">
        <div style="color: var(--text-main); font-size: 0.9rem; text-align: center; padding: 120px 0; font-family: 'Orbitron', sans-serif;">Loading project configurations...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 45, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ff66" }, 
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false }, 
                "move": { "enable": true, "speed": 2, "direction": "top-right", "random": true, "out_mode": "out" }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
            "retina_detect": true
        });

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = parseInt(urlParams.get('id'));

        if (!projectId) {
            document.getElementById('details-root').innerHTML = `<div style="color:red; text-align:center;">No project parameter identified.</div>`;
        } else {
            fetch('projects.json')
                .then(res => res.json())
                .then(data => {
                    const proj = data.find(p => p.id === projectId);

                    if (!proj) {
                        document.getElementById('details-root').innerHTML = `<div style="color:red; text-align:center;">Project layout missing in dataset.</div>`;
                        return;
                    }

                    document.getElementById('dynamic-bg-blur').style.backgroundImage = `url('${proj.image}')`;

                    let chosenColor = proj.tagColor || "green";
                    let tagClass = `tag-${chosenColor}`;
                    let iconColorClass = `color-${chosenColor}`;

                    let fallbackIcon = "fa-solid fa-bolt";
                    if(proj.category === "platformer") fallbackIcon = "fa-solid fa-tree";

                    // Map Features to Mini Row under Description
                    const miniFeaturesMarkup = proj.features ? proj.features.map(f => `
                        <div class="mini-feature-box">
                            <i class="${f.icon}"></i>
                            <span>${f.title.replace(' ', '<br>')}</span>
                        </div>
                    `).join('') : '';

                    // Key Features List
                    const listFeaturesMarkup = proj.features ? proj.features.map(f => `
                        <li><i class="fa-solid fa-circle-check"></i> ${f.title} - ${f.desc}</li>
                    `).join('') : '';

                    // Media Slider
                    let sliderThumbsMarkup = '';
                    let thumbIndex = 0;
                    if (proj.videos) {
                        proj.videos.forEach((v) => {
                            sliderThumbsMarkup += `
                                <div class="steam-thumb ${thumbIndex === 0 ? 'active' : ''}" data-index="${thumbIndex}" onclick="switchSteamMedia('video', '${v.url}', this)">
                                    <div class="steam-thumb-overlay-icon"><i class="fa-solid fa-play"></i></div>
                                    <img src="${proj.image}">
                                </div>
                            `;
                            thumbIndex++;
                        });
                    }
                    if (proj.gallery) {
                        proj.gallery.forEach(img => {
                            sliderThumbsMarkup += `
                                <div class="steam-thumb" data-index="${thumbIndex}" onclick="switchSteamMedia('image', '${img}', this)">
                                    <img src="${img}">
                                </div>
                            `;
                            thumbIndex++;
                        });
                    }

                    // Map Meta Info to Metrics & Tech Highlights blocks dynamically
                    let metaMetricsHTML = '';
                    let techHighlightsHTML = '';
                    
                    if(proj.metaInfo) {
                        metaMetricsHTML = proj.metaInfo.map(m => `
                            <div class="metric-box">
                                <h3>${m.value.split(' ')[0]}</h3>
                                <p>${m.label}</p>
                            </div>
                        `).join('');

                        techHighlightsHTML = proj.metaInfo.map((m, i) => {
                            const colors = ['c-purple', 'c-green', 'c-orange', 'c-blue'];
                            const icons = ['fa-cubes', 'fa-database', 'fa-mobile-screen', 'fa-gauge-high'];
                            return `
                                <div class="highlight-item">
                                    <i class="fa-solid ${icons[i%4]} ${colors[i%4]}"></i>
                                    <div>
                                        <h5>${m.label}</h5>
                                        <p>${m.value}</p>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        metaMetricsHTML = `<div class="metric-box"><h3>${proj.year}</h3><p>Year</p></div><div class="metric-box"><h3>${proj.platform}</h3><p>Platform</p></div>`;
                        techHighlightsHTML = `<p>No technical highlights added to JSON yet.</p>`;
                    }


                    document.getElementById('details-root').innerHTML = `
                        
                        <div class="breadcrumb">
                            Home &nbsp; <i class="fa-solid fa-chevron-right" style="font-size:0.6rem"></i> &nbsp; Projects &nbsp; <i class="fa-solid fa-chevron-right" style="font-size:0.6rem"></i> &nbsp; <span>${proj.name}</span>
                        </div>

                        <div class="hero-bento">
                            <div class="hero-left-card">
                                <span class="proj-tag-badge ${tagClass}">${proj.tag}</span>
                                <h1 class="proj-title">${proj.name} <i class="${fallbackIcon} ${iconColorClass}"></i></h1>
                                <p class="brief-text-desc">${proj.desc}</p>
                                
                                <div class="hero-action-row">
                                    <a href="${proj.liveDemo || '#'}" target="_blank" class="btn-main-play"><i class="fa-solid fa-gamepad"></i> Play Demo (Web)</a>
                                    <a href="${proj.videoUrl || '#'}" target="_blank" class="btn-outline"><i class="fa-regular fa-circle-play"></i> Watch Trailer</a>
                                </div>

                                <div class="mini-features-row">
                                    ${miniFeaturesMarkup}
                                </div>
                            </div>
                            
                            <div class="steam-media-wrapper">
                                <div class="video-player-frame" id="steam-main-viewport">
                                    <iframe id="steam-iframe-target" src="${proj.videoUrl || ''}" allowfullscreen></iframe>
                                </div>
                                <div class="slider-relative-tray">
                                    <button class="slider-arrow arrow-left" onclick="slideSteamTray('left')"><i class="fa-solid fa-chevron-left"></i></button>
                                    <div class="steam-thumbnail-slider" id="steam-slider-track">
                                        ${sliderThumbsMarkup}
                                    </div>
                                    <button class="slider-arrow arrow-right" onclick="slideSteamTray('right')"><i class="fa-solid fa-chevron-right"></i></button>
                                </div>
                            </div>
                        </div>

                        <div class="bento-main-grid">
                            <div style="display:flex; flex-direction:column; gap:25px;">
                                <div class="bento-card">
                                    <h3 class="bento-card-title">Project Overview</h3>
                                    <p><strong>${proj.name}</strong> ${proj.overview || 'is a highly optimized game focusing on performance and core game loop mechanics.'}</p>
                                </div>

                                <div class="bento-card">
                                    <h3 class="bento-card-title">Key Features</h3>
                                    <ul class="feature-list-check">
                                        ${listFeaturesMarkup}
                                    </ul>
                                </div>
                                
                                <div class="bento-card">
                                    <h3 class="bento-card-title">Project Metrics</h3>
                                    <div class="metrics-grid">
                                        ${metaMetricsHTML}
                                    </div>
                                </div>
                            </div>

                            <div style="display:flex; flex-direction:column; gap:25px;">
                                <div class="bento-card">
                                    <h3 class="bento-card-title">Technical Highlights</h3>
                                    <div class="tech-highlights-grid">
                                        ${techHighlightsHTML}
                                    </div>
                                </div>

                                <div class="bento-card">
                                    <h3 class="bento-card-title">Challenges & Solutions</h3>
                                    <div class="challenges-list">
                                        <div class="challenge-row">
                                            <p><strong>Challenge:</strong> Performance drops due to instantiating objects.</p>
                                            <i class="fa-solid fa-chevron-right c-arrow"></i>
                                            <p><strong>Solution:</strong> Implemented Object Pooling for smooth mechanics.</p>
                                        </div>
                                        <div class="challenge-row">
                                            <p><strong>Challenge:</strong> Multiple overlapping sound issues.</p>
                                            <i class="fa-solid fa-chevron-right c-arrow"></i>
                                            <p><strong>Solution:</strong> Used Unity Audio Mixer groups for dynamic control.</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="bento-card">
                                    <h3 class="bento-card-title">Development Process</h3>
                                    <div class="dev-process-row">
                                        <div class="process-step"><div class="step-icon c-blue"><i class="fa-regular fa-lightbulb"></i></div><h5>Concept</h5><p>Planning</p></div>
                                        <div class="process-step"><div class="step-icon c-purple"><i class="fa-solid fa-gamepad"></i></div><h5>Prototype</h5><p>Mechanics</p></div>
                                        <div class="process-step"><div class="step-icon c-green"><i class="fa-solid fa-code"></i></div><h5>Core</h5><p>Systems</p></div>
                                        <div class="process-step"><div class="step-icon c-orange"><i class="fa-solid fa-wand-magic-sparkles"></i></div><h5>Polish</h5><p>UI & VFX</p></div>
                                        <div class="process-step"><div class="step-icon c-pink"><i class="fa-solid fa-rocket"></i></div><h5>Release</h5><p>Publish</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bottom-cta-bar">
                            <div class="cta-quote">
                                <i class="fa-solid fa-quote-left"></i>
                                <p>Building fun, optimized and scalable games that players love.</p>
                            </div>
                            <div class="cta-links">
                                <span>Let's build something amazing together!</span>
                                <div class="link-row">
                                    <a href="https://wa.me/917511104768" target="_blank"><i class="fa-brands fa-whatsapp" style="color:#25D366"></i> WhatsApp</a>
                                    <a href="mailto:abhilashsaji.dev@gmail.com"><i class="fa-regular fa-envelope" style="color:#fff"></i> Email</a>
                                    <a href="https://www.linkedin.com/in/abhilashsaji" target="_blank"><i class="fa-brands fa-linkedin" style="color:#0077B5"></i> LinkedIn</a>
                                </div>
                            </div>
                        </div>
                    `;
                })
                .catch(err => console.error("Error launching dynamic system layouts:", err));
        }

        function switchSteamMedia(type, path, elementRef) {
            document.querySelectorAll('.steam-thumb').forEach(el => el.classList.remove('active'));
            elementRef.classList.add('active');
            const viewport = document.getElementById('steam-main-viewport');
            if (type === 'video') {
                viewport.innerHTML = `<iframe id="steam-iframe-target" src="${path}" allowfullscreen></iframe>`;
            } else if (type === 'image') {
                viewport.innerHTML = `<img src="${path}" style="border-radius:12px;" onerror="this.src='https://via.placeholder.com/600x360/041219/ffffff'">`;
            }
        }

        function slideSteamTray(direction) {
            const track = document.getElementById('steam-slider-track');
            const step = track.clientWidth / 2;
            direction === 'left' ? track.scrollLeft -= step : track.scrollLeft += step;
        }
    </script>
</body>
</html>
