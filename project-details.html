<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Abhilash Saji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* --- RESTORED ORIGINAL COLOR THEME --- */
            --bg-dark: #02080c;
            --bg-card: rgba(4, 18, 25, 0.85); /* Deep black transparent */
            --primary-green: #00ff66; /* Original Green */
            --text-main: #ffffff;
            --text-muted: #8da4ae;
            --border-color: rgba(0, 255, 102, 0.15); /* Original Green Border */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            padding-top: 80px;
            position: relative;
            min-height: 100vh;
        }
        
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        /* --- BACKGROUND MANAGEMENT --- */
        #dynamic-bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.25);
            transform: scale(1.05);
            z-index: -2;
            transition: background-image 0.5s ease;
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100vh;
            top: 0; left: 0; z-index: -1;
            pointer-events: none;
        }

        /* --- NAVIGATION HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 6%; background: rgba(2, 8, 12, 0.85); backdrop-filter: blur(16px);
            position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 1.5px; }
        .logo i { color: var(--primary-green); }
        
        .btn-go-back-nav {
            border: 1px solid var(--primary-green); background: rgba(0, 255, 102, 0.05); color: var(--primary-green);
            padding: 8px 18px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .btn-go-back-nav:hover { background: var(--primary-green); color: var(--bg-dark); }

        /* --- BENTO GRID LAYOUT CONTAINER --- */
        .bento-container { max-width: 1400px; margin: 0 auto; padding: 30px 6% 60px; position: relative; z-index: 5; }

        /* HERO TOP SECTION */
        .hero-bento { display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; margin-bottom: 25px; align-items: stretch; }
        
        .hero-left-card { display: flex; flex-direction: column; justify-content: center; }
        .proj-tag-badge { border-radius: 4px; font-size: 0.65rem; padding: 4px 10px; font-weight: 700; text-transform: uppercase; width: fit-content; margin-bottom: 15px; border: 1px solid var(--primary-green); color: var(--primary-green); background: rgba(0,255,102,0.05); }
        .proj-title { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 900; text-transform: uppercase; color: #ffffff; margin-bottom: 15px; line-height: 1.1; display: flex; align-items: center; gap: 15px; }
        .brief-text-desc { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; max-width: 95%; }
        
        .hero-action-row { display: flex; gap: 15px; margin-bottom: 30px; }
        
        /* RESTORED GREEN BUTTON */
        .btn-main-play { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 14px 28px; border-radius: 6px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; background: var(--primary-green); color: var(--bg-dark); border: none; cursor: pointer; transition: 0.3s; }
        .btn-main-play:hover { box-shadow: 0 0 20px rgba(0, 255, 102, 0.4); transform: translateY(-2px); }

        /* --- STEAM MEDIA SLIDER (16:9 Ratio Applied) --- */
        .steam-media-wrapper { display: flex; flex-direction: column; gap: 12px; }
        .video-player-frame { width: 100%; aspect-ratio: 16 / 9; height: auto; border-radius: 8px; background: #000; overflow: hidden; border: 1px solid var(--border-color); position: relative; }
        .video-player-frame iframe, .video-player-frame img { width: 100%; height: 100%; border: none; object-fit: cover; }
        
        .slider-relative-tray { position: relative; display: flex; align-items: center; width: 100%; padding: 0 35px; }
        .steam-thumbnail-slider { display: flex; gap: 10px; overflow-x: hidden; scroll-behavior: smooth; width: 100%; }
        .steam-thumb { flex: 0 0 calc(20% - 8px); height: 60px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; background: #000; opacity: 0.5; transition: 0.3s; }
        .steam-thumb:hover, .steam-thumb.active { opacity: 1; border-color: var(--primary-green); }
        .steam-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .steam-thumb-overlay-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--primary-green); font-size: 1.2rem; }
        .slider-arrow { background: rgba(2, 8, 12, 0.9); border: 1px solid var(--border-color); color: #ffffff; position: absolute; top: 0; bottom: 0; width: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; font-size: 0.8rem; height: 60px; border-radius: 6px; }
        .slider-arrow:hover { color: var(--primary-green); border-color: var(--primary-green); }
        .arrow-left { left: 0; }
        .arrow-right { right: 0; }

        /* --- NEW BENTO GRID CONTENT SECTIONS --- */
        .bento-3-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .bento-2-col { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        
        .bento-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; backdrop-filter: blur(8px); }
        .bento-card-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; text-transform: uppercase; color: #ffffff; margin-bottom: 15px; letter-spacing: 0.5px; border-bottom: 1px solid rgba(0, 255, 102, 0.2); padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        .bento-card p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

        /* Features List inside Bento */
        .feature-list-bento { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .feature-list-bento li { font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: start; gap: 8px; line-height: 1.4; }
        .feature-list-bento li i { color: var(--text-main); font-size: 0.5rem; margin-top: 5px; }

        /* Metrics Grid inside Bento */
        .metrics-grid { display: flex; flex-direction: column; gap: 10px; }
        .metric-item { display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .metric-item span { color: var(--text-muted); }
        .metric-item strong { color: var(--text-main); }

        /* Tech Highlights & Challenges lists */
        .tech-list { display: flex; flex-direction: column; gap: 10px; }
        .tech-item { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }
        .tech-item strong { color: var(--text-main); display: block; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; margin-bottom: 2px; }

        /* Bottom CTA Bar */
        .bottom-cta-bar { background: var(--bg-card); backdrop-filter: blur(8px); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .cta-quote { display: flex; gap: 15px; align-items: center; }
        .cta-quote i { font-size: 2rem; color: var(--primary-green); /* FIXED PURPLE COMMA TO GREEN */ } 
        .cta-quote p { font-size: 1.1rem; color: #fff; font-weight: 600; max-width: 450px; line-height: 1.4; margin:0; }
        
        .cta-links { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
        .cta-links span { font-size: 1rem; color: var(--text-main); font-family: 'Orbitron', sans-serif; font-weight: 700;}
        .link-row { display: flex; gap: 10px; }
        .link-row a { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #fff; background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 4px; border: 1px solid var(--border-color); transition: 0.3s; }
        .link-row a:hover { background: rgba(0,255,102,0.1); border-color: var(--primary-green); color: var(--primary-green); }

        /* Tag Colors Updated */
        .tag-green { border: 1px solid #00ff66; color: #00ff66; }
        .tag-cyanBlue { border: 1px solid #00d4ff; color: #00d4ff; }
        .color-cyanBlue { color: #00d4ff; }

        @media (max-width: 1024px) {
            .hero-bento { grid-template-columns: 1fr; }
            .bento-3-col, .bento-2-col { grid-template-columns: 1fr; }
            .bottom-cta-bar { flex-direction: column; text-align: left; gap: 20px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div id="dynamic-bg-blur"></div>
    <div id="particles-js"></div>

    <header>
        <div class="logo"><i class="fa-solid fa-gamepad"></i> ABHILASH SAJI</div>
        <a href="projects.html" class="btn-go-back-nav">Back to Projects</a>
    </header>

    <main class="bento-container" id="details-root">
        <div style="color: var(--text-main); font-size: 0.9rem; text-align: center; padding: 120px 0; font-family: 'Orbitron', sans-serif;">Loading project configurations...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 45, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ff66" }, 
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false }, 
                "move": { "enable": true, "speed": 2, "direction": "top-right", "random": true, "out_mode": "out" }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
            "retina_detect": true
        });

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = parseInt(urlParams.get('id'));

        if (!projectId) {
            document.getElementById('details-root').innerHTML = `<div style="color:red; text-align:center;">No project parameter identified.</div>`;
        } else {
            fetch('projects.json')
                .then(res => res.json())
                .then(data => {
                    const proj = data.find(p => p.id === projectId);

                    if (!proj) {
                        document.getElementById('details-root').innerHTML = `<div style="color:red; text-align:center;">Project layout missing in dataset.</div>`;
                        return;
                    }

                    document.getElementById('dynamic-bg-blur').style.backgroundImage = `url('${proj.image}')`;

                    let chosenColor = proj.tagColor || "green";
                    let tagClass = `tag-${chosenColor}`;
                    let iconColorClass = `color-${chosenColor}`;

                    let fallbackIcon = "fa-solid fa-bolt";
                    if(proj.category === "platformer") fallbackIcon = "fa-solid fa-tree";

                    // Media Slider Map
                    let sliderThumbsMarkup = '';
                    let thumbIndex = 0;
                    if (proj.videos) {
                        proj.videos.forEach((v) => {
                            sliderThumbsMarkup += `
                                <div class="steam-thumb ${thumbIndex === 0 ? 'active' : ''}" data-index="${thumbIndex}" onclick="switchSteamMedia('video', '${v.url}', this)">
                                    <div class="steam-thumb-overlay-icon"><i class="fa-solid fa-play"></i></div>
                                    <img src="${proj.image}">
                                </div>
                            `;
                            thumbIndex++;
                        });
                    }
                    if (proj.gallery) {
                        proj.gallery.forEach(img => {
                            sliderThumbsMarkup += `
                                <div class="steam-thumb" data-index="${thumbIndex}" onclick="switchSteamMedia('image', '${img}', this)">
                                    <img src="${img}">
                                </div>
                            `;
                            thumbIndex++;
                        });
                    }

                    // Map Features to Bullet Points
                    const listFeaturesMarkup = proj.features ? proj.features.map(f => `
                        <li><i class="fa-solid fa-circle"></i> ${f.title}: ${f.desc}</li>
                    `).join('') : '<li>No features listed.</li>';

                    // Map Meta Info to Metrics 
                    let metaMetricsHTML = '';
                    if(proj.metaInfo) {
                        metaMetricsHTML = proj.metaInfo.map(m => `
                            <div class="metric-item">
                                <span>${m.label}</span>
                                <strong>${m.value}</strong>
                            </div>
                        `).join('');
                    } else {
                        metaMetricsHTML = `<div class="metric-item"><span>Year</span><strong>${proj.year}</strong></div><div class="metric-item"><span>Platform</span><strong>${proj.platform}</strong></div>`;
                    }

                    // Technical Highlights List
                    let techHighlightsHTML = '';
                    if(proj.techHighlights) {
                        techHighlightsHTML = proj.techHighlights.map(m => `
                            <div class="tech-item">
                                <strong>${m.title}</strong>
                                ${m.desc}
                            </div>
                        `).join('');
                    } else {
                        techHighlightsHTML = `<div class="tech-item">No technical highlights available.</div>`;
                    }

                    // Challenges List
                    let challengesHTML = '';
                    if(proj.challenges) {
                        challengesHTML = proj.challenges.map(c => `
                            <div class="tech-item">
                                <strong>Challenge: ${c.challenge}</strong>
                                Solution: ${c.solution}
                            </div>
                        `).join('');
                    } else {
                        challengesHTML = `<div class="tech-item">No challenges documented.</div>`;
                    }

                    // Dynamic CTA Links (Removing Github dynamically)
                    let ctaLinksHTML = '';
                    let ctaQuote = "Building fun, optimized and scalable games that players love.";
                    if(proj.cta) {
                        ctaQuote = proj.cta.quote;
                        // Filters out the GitHub link if it exists in JSON
                        ctaLinksHTML = proj.cta.links.filter(l => l.text.toLowerCase() !== 'github').map(l => `
                            <a href="${l.url}" target="_blank"><i class="fa-brands ${l.icon}" style="color:${l.iconColor}"></i> ${l.text}</a>
                        `).join('');
                    }

                    // Generate Full HTML Layout
                    document.getElementById('details-root').innerHTML = `
                        
                        <div class="hero-bento">
                            <div class="hero-left-card">
                                <span class="proj-tag-badge ${tagClass}">${proj.tag}</span>
                                <h1 class="proj-title">${proj.name} <i class="${fallbackIcon} ${iconColorClass}"></i></h1>
                                <p class="brief-text-desc">${proj.desc}</p>
                                
                                <div class="hero-action-row">
                                    <a href="${proj.liveDemo || '#'}" target="_blank" class="btn-main-play"><i class="fa-solid fa-gamepad"></i> Play Build</a>
                                </div>
                            </div>
                            
                            <div class="steam-media-wrapper">
                                <div class="video-player-frame" id="steam-main-viewport">
                                    <iframe id="steam-iframe-target" src="${proj.videoUrl || ''}" allowfullscreen></iframe>
                                </div>
                                <div class="slider-relative-tray">
                                    <button class="slider-arrow arrow-left" onclick="slideSteamTray('left')"><i class="fa-solid fa-chevron-left"></i></button>
                                    <div class="steam-thumbnail-slider" id="steam-slider-track">
                                        ${sliderThumbsMarkup}
                                    </div>
                                    <button class="slider-arrow arrow-right" onclick="slideSteamTray('right')"><i class="fa-solid fa-chevron-right"></i></button>
                                </div>
                            </div>
                        </div>

                        <div class="bento-3-col">
                            <div class="bento-card">
                                <h3 class="bento-card-title">Overview</h3>
                                <p>${proj.overview || 'Overview of the project mechanics and details.'}</p>
                            </div>
                            <div class="bento-card">
                                <h3 class="bento-card-title">Features</h3>
                                <ul class="feature-list-bento">
                                    ${listFeaturesMarkup}
                                </ul>
                            </div>
                            <div class="bento-card">
                                <h3 class="bento-card-title">Metrics</h3>
                                <div class="metrics-grid">
                                    ${metaMetricsHTML}
                                </div>
                            </div>
                        </div>

                        <div class="bento-2-col">
                            <div class="bento-card">
                                <h3 class="bento-card-title">Technical Highlights</h3>
                                <div class="tech-list">
                                    ${techHighlightsHTML}
                                </div>
                            </div>
                            <div class="bento-card">
                                <h3 class="bento-card-title">Challenges</h3>
                                <div class="tech-list">
                                    ${challengesHTML}
                                </div>
                            </div>
                        </div>

                        <div class="bottom-cta-bar">
                            <div class="cta-quote">
                                <i class="fa-solid fa-quote-left"></i>
                                <p>${ctaQuote}</p>
                            </div>
                            <div class="cta-links">
                                <span>Let's build something amazing together!</span>
                                <div class="link-row">
                                    ${ctaLinksHTML}
                                </div>
                            </div>
                        </div>
                    `;
                })
                .catch(err => console.error("Error launching dynamic system layouts:", err));
        }

        // --- FIXED: AUTO-SLIDE ON IMAGE SELECTION ---
        function switchSteamMedia(type, path, elementRef) {
            // Remove active classes
            document.querySelectorAll('.steam-thumb').forEach(el => el.classList.remove('active'));
            // Add active class to clicked thumbnail
            elementRef.classList.add('active');
            
            // Change viewport content
            const viewport = document.getElementById('steam-main-viewport');
            if (type === 'video') {
                viewport.innerHTML = `<iframe id="steam-iframe-target" src="${path}" allowfullscreen></iframe>`;
            } else if (type === 'image') {
                viewport.innerHTML = `<img src="${path}" onerror="this.src='https://via.placeholder.com/1920x1080/041219/ffffff'">`;
            }

            // Bring the active thumbnail to the center (Auto-Scroll)
            const track = document.getElementById('steam-slider-track');
            const thumbWidth = elementRef.offsetWidth + 10; // width + gap
            const centerPosition = elementRef.offsetLeft + (thumbWidth / 2);
            const viewCenter = track.clientWidth / 2;
            
            // Smoothly scroll the track
            track.scroll({
                left: centerPosition - viewCenter,
                behavior: 'smooth'
            });
        }

        function slideSteamTray(direction) {
            const track = document.getElementById('steam-slider-track');
            const step = track.clientWidth / 2;
            direction === 'left' ? track.scrollLeft -= step : track.scrollLeft += step;
        }
    </script>
</body>
</html>
