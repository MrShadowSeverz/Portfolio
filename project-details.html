<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Showcase | Abhilash Saji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #02080c;
            --bg-card: rgba(4, 18, 25, 0.8);
            --primary-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #8da4ae;
            --border-color: rgba(0, 255, 102, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; padding-top: 80px; min-height: 100vh; }
        
        /* CSS for the new CyanBlue tag */
        .tag-green { border: 1px solid #00ff66; color: #00ff66; }
        .tag-cyanBlue { border: 1px solid #00d4ff; color: #00d4ff; }

        /* Rest of your CSS remains the same as in the last update */
        #dynamic-bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(15px) brightness(0.25); transform: scale(1.05); z-index: -2; }
        .details-container { max-width: 1400px; margin: 0 auto; padding: 20px 6%; position: relative; z-index: 5; }
        .hero-grid { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 30px; margin-bottom: 35px; }
        .brief-info-box { background: var(--bg-card); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); }
        .proj-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; color: #ffffff; margin-bottom: 15px; }
        .meta-dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .meta-box { background: rgba(2, 8, 12, 0.6); padding: 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.03); }
        .btn-live { background: var(--primary-green); color: var(--bg-dark); padding: 14px; font-weight: 700; text-align: center; display: block; border-radius: 4px; }
        
        .steam-media-wrapper { display: flex; flex-direction: column; gap: 12px; background: var(--bg-card); padding: 15px; border-radius: 8px; }
        .video-player-frame { width: 100%; height: 360px; background: #000; }
        .steam-thumbnail-slider { display: flex; gap: 10px; overflow-x: hidden; scroll-behavior: smooth; }
        .steam-thumb { flex: 0 0 calc(20% - 8px); height: 65px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; }
        .steam-thumb.active { border-color: var(--primary-green); }
        .slider-arrow { cursor: pointer; padding: 0 10px; }

        .overview-row { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 30px; margin-bottom: 35px; }
        .overview-box { background: var(--bg-card); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); }
        .features-sub-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .feature-card-item { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; display: flex; align-items: center; gap: 18px; }
        
        /* Hypercasual Icons Style */
        .coin-icon-shell { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #00ffbc, #00b395); }
        .coin-icon-shell i { color: #fff; font-size: 1.2rem; }
        .hire-cta-panel { background: var(--bg-card); padding: 25px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-hire-me { background: var(--primary-green); color: var(--bg-dark); padding: 12px 24px; font-weight: 700; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="dynamic-bg-blur"></div>
    <main class="details-container" id="details-root"></main>

    <script>
        const projectId = parseInt(new URLSearchParams(window.location.search).get('id'));
        fetch('projects.json')
            .then(res => res.json())
            .then(data => {
                const proj = data.find(p => p.id === projectId);
                document.getElementById('dynamic-bg-blur').style.backgroundImage = `url('${proj.image}')`;
                
                const featuresMarkup = proj.features.map(f => `
                    <div class="feature-card-item">
                        <div class="coin-icon-shell"><i class="${f.icon}"></i></div>
                        <div><h4>${f.title}</h4><p>${f.desc}</p></div>
                    </div>
                `).join('');

                let slider = '';
                proj.videos.forEach((v, i) => slider += `<div class="steam-thumb ${i===0?'active':''}" data-index="${i}" onclick="switchMedia('video', '${v.url}', this)"><img src="${proj.image}"></div>`);
                proj.gallery.forEach((img, i) => slider += `<div class="steam-thumb" data-index="${proj.videos.length + i}" onclick="switchMedia('image', '${img}', this)"><img src="${img}"></div>`);

                document.getElementById('details-root').innerHTML = `
                    <div class="hero-grid">
                        <div class="brief-info-box">
                            <span class="proj-tag-badge tag-${proj.tagColor}">${proj.tag}</span>
                            <h1 class="proj-title">${proj.name}</h1>
                            <div class="game-brief-section"><div class="brief-thumb-wrapper"><img src="${proj.image}"></div><p class="brief-text-desc">${proj.desc}</p></div>
                            <div class="meta-dashboard-grid">
                                <div class="meta-box"><span>Year</span><p>${proj.year}</p></div>
                                <div class="meta-box"><span>Platform</span><p>${proj.platform}</p></div>
                            </div>
                            <a href="${proj.liveDemo}" target="_blank" class="btn-live">PLAY BUILD</a>
                        </div>
                        <div class="steam-media-wrapper">
                            <div class="video-player-frame" id="viewport"><iframe src="${proj.videoUrl}" allowfullscreen></iframe></div>
                            <div class="slider-relative-tray">
                                <button class="slider-arrow" onclick="slide(-200)"><i class="fa-solid fa-chevron-left"></i></button>
                                <div class="steam-thumbnail-slider" id="track">${slider}</div>
                                <button class="slider-arrow" onclick="slide(200)"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="overview-row">
                        <div class="overview-box"><h3 class="section-headline">Overview</h3><p>${proj.overview}</p></div>
                        <div class="features-sub-grid">${featuresMarkup}</div>
                    </div>
                    <div class="hire-cta-panel">
                        <div><h3>Like this project?</h3><p>I'm available for freelance work.</p></div>
                        <a href="mailto:abhilashsaji.dev@gmail.com?subject=Project Inquiry" class="btn-hire-me">HIRE ME</a>
                    </div>
                `;
            });

        function switchMedia(type, path, el) {
            document.querySelectorAll('.steam-thumb').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            const v = document.getElementById('viewport');
            v.innerHTML = type === 'video' ? `<iframe src="${path}"></iframe>` : `<img src="${path}">`;
        }
        function slide(amt) { document.getElementById('track').scrollLeft += amt; }
    </script>
</body>
</html>
