<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects Archive | Abhilash Saji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #02080c;
            --bg-card: rgba(4, 18, 25, 0.85); 
            --primary-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #7d9096;
            --border-color: rgba(255, 255, 255, 0.05);
            --glow-color: rgba(0, 255, 102, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            /* Subtle gaming grid pattern background texture */
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        /* --- PARTICLES CANVAS LAYER --- */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* --- REDESIGNED HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 6%;
            background: rgba(2, 8, 12, 0.85);
            backdrop-filter: blur(16px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .logo i { color: var(--primary-green); }

        .btn-go-back {
            border: 1px solid var(--primary-green);
            background: rgba(0, 255, 102, 0.05);
            color: var(--primary-green);
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 10;
        }
        .btn-go-back:hover {
            background: var(--primary-green);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--glow-color);
        }

        /* --- ARCHIVE LAYOUT CONTENT --- */
        .archive-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 105px 6% 30px 6%;
            position: relative;
            z-index: 5;
        }

        .archive-flex-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 25px;
        }

        .archive-title-area {
            width: 100%;
        }

        .archive-subtitle {
            color: var(--primary-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .archive-main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .archive-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            max-width: 680px;
            line-height: 1.5;
        }

        /* --- UNIFORM STATIC / HIGHLIGHT ONLY ACTIVE FILTER BUTTONS --- */
        .filter-buttons-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 15px;
        }

        .btn-filter {
            background-color: rgba(4, 18, 25, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-filter i { font-size: 0.75rem; color: var(--text-muted); }

        /* Neon Highlights for Active / Hover states only */
        .btn-filter[data-cat="all"]:hover, .btn-filter[data-cat="all"].active { border-color: #00ff66; color: #00ff66; background: rgba(0, 255, 102, 0.05); box-shadow: 0 0 10px rgba(0, 255, 102, 0.1); }
        .btn-filter[data-cat="all"]:hover i, .btn-filter[data-cat="all"].active i { color: #00ff66; }

        .btn-filter[data-cat="platformer"]:hover, .btn-filter[data-cat="platformer"].active { border-color: #00ffbc; color: #00ffbc; background: rgba(0, 255, 188, 0.05); box-shadow: 0 0 10px rgba(0, 255, 188, 0.1); }
        .btn-filter[data-cat="platformer"]:hover i, .btn-filter[data-cat="platformer"].active i { color: #00ffbc; }

        .btn-filter[data-cat="metroidvania"]:hover, .btn-filter[data-cat="metroidvania"].active { border-color: #bb55ff; color: #bb55ff; background: rgba(187, 85, 255, 0.05); box-shadow: 0 0 10px rgba(187, 85, 255, 0.1); }
        .btn-filter[data-cat="metroidvania"]:hover i, .btn-filter[data-cat="metroidvania"].active i { color: #bb55ff; }

        .btn-filter[data-cat="isometric"]:hover, .btn-filter[data-cat="isometric"].active { border-color: #33a6ff; color: #33a6ff; background: rgba(51, 166, 255, 0.05); box-shadow: 0 0 10px rgba(51, 166, 255, 0.1); }
        .btn-filter[data-cat="isometric"]:hover i, .btn-filter[data-cat="isometric"].active i { color: #33a6ff; }

        .btn-filter[data-cat="fps-tps"]:hover, .btn-filter[data-cat="fps-tps"].active { border-color: #ff3344; color: #ff3344; background: rgba(255, 51, 68, 0.05); box-shadow: 0 0 10px rgba(255, 51, 68, 0.1); }
        .btn-filter[data-cat="fps-tps"]:hover i, .btn-filter[data-cat="fps-tps"].active i { color: #ff3344; }

        .btn-filter[data-cat="mobile"]:hover, .btn-filter[data-cat="mobile"].active { border-color: #ff9900; color: #ff9900; background: rgba(255, 153, 0, 0.05); box-shadow: 0 0 10px rgba(255, 153, 0, 0.1); }
        .btn-filter[data-cat="mobile"]:hover i, .btn-filter[data-cat="mobile"].active i { color: #ff9900; }

        .btn-filter[data-cat="simulation"]:hover, .btn-filter[data-cat="simulation"].active { border-color: #00ff66; color: #00ff66; background: rgba(0, 255, 102, 0.05); box-shadow: 0 0 10px rgba(0, 255, 102, 0.1); }
        .btn-filter[data-cat="simulation"]:hover i, .btn-filter[data-cat="simulation"].active i { color: #00ff66; }

        .btn-filter[data-cat="ar-vr"]:hover, .btn-filter[data-cat="ar-vr"].active { border-color: #2196F3; color: #2196F3; background: rgba(33, 150, 243, 0.05); box-shadow: 0 0 10px rgba(33, 150, 243, 0.1); }
        .btn-filter[data-cat="ar-vr"]:hover i, .btn-filter[data-cat="ar-vr"].active i { color: #2196F3; }

        /* --- CARDS GRID --- */
        .archive-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }

        .archive-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            backdrop-filter: blur(8px);
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .archive-card:hover {
            border-color: rgba(0, 255, 102, 0.2);
            transform: translateY(-2px);
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
            background-color: #061822;
            overflow: hidden;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .tag-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(2, 8, 12, 0.9);
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 10;
            opacity: 1 !important;
            letter-spacing: 0.5px;
        }

        .tag-green { border: 1px solid #00ff66; color: #00ff66; }
        .tag-purple { border: 1px solid #bb55ff; color: #bb55ff; }
        .tag-blue { border: 1px solid #33a6ff; color: #33a6ff; }
        .tag-orange { border: 1px solid #ff9900; color: #ff9900; }
        .tag-red { border: 1px solid #ff3344; color: #ff3344; }

        .info-panel {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .proj-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
        }

        .theme-icon { font-size: 0.95rem; }

        .color-green { color: #00ff66; }
        .color-purple { color: #bb55ff; }
        .color-blue { color: #33a6ff; }
        .color-orange { color: #ff9900; }
        .color-red { color: #ff3344; }

        .proj-desc {
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.5;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .tech-badges-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 10px;
        }

        .badge-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-size: 0.6rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .proj-link {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary-green);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: auto;
        }

        /* --- BOTTOM CTA META LINE --- */
        .contact-cta-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 30px;
        }

        .btn-cta-contact {
            border: 1px solid var(--primary-green);
            background: transparent;
            color: var(--primary-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .btn-cta-contact:hover {
            background: var(--primary-green);
            color: var(--bg-dark);
            box-shadow: 0 0 12px var(--glow-color);
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding: 25px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: #02080c;
        }

        @media (max-width: 968px) {
            .archive-flex-header { align-items: center; text-align: center; }
            .filter-buttons-row { justify-content: center; }
            header { padding: 12px 4%; }
            footer { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <header>
        <div class="logo">
            <i class="fa-solid fa-gamepad"></i> ABHILASH SAJI
        </div>
        <div class="header-btn-area">
            <a href="index.html" class="btn-go-back"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
        </div>
    </header>

    <main class="archive-section">
        
        <div class="archive-flex-header">
            <div class="archive-title-area">
                <div class="archive-subtitle">MY WORK</div>
                <h1 class="archive-main-title">All Projects</h1>
                <p class="archive-desc">
                    Explore a collection of games I've designed and developed using Unity and C#. Filter down by specific structural sub-genres.
                </p>
            </div>
            
            <div class="filter-buttons-row">
                <button class="btn-filter active" data-cat="all" onclick="filterCategory('all', this)"><i class="fa-solid fa-table-cells"></i> All</button>
                <button class="btn-filter" data-cat="platformer" onclick="filterCategory('platformer', this)"><i class="fa-solid fa-tree"></i> Platformers</button>
                <button class="btn-filter" data-cat="metroidvania" onclick="filterCategory('metroidvania', this)"><i class="fa-solid fa-dungeon"></i> Metroidvanias</button>
                <button class="btn-filter" data-cat="isometric" onclick="filterCategory('isometric', this)"><i class="fa-solid fa-layer-group"></i> Isometric</button>
                <button class="btn-filter" data-cat="fps-tps" onclick="filterCategory('fps-tps', this)"><i class="fa-solid fa-crosshairs"></i> FPS & TPS</button>
                <button class="btn-filter" data-cat="mobile" onclick="filterCategory('mobile', this)"><i class="fa-solid fa-mobile-screen-button"></i> Mobile</button>
                <button class="btn-filter" data-cat="simulation" onclick="filterCategory('simulation', this)"><i class="fa-solid fa-car-side"></i> Simulation</button>
                <button class="btn-filter" data-cat="ar-vr" onclick="filterCategory('ar-vr', this)"><i class="fa-solid fa-vr-cardboard"></i> AR & VR</button>
            </div>
        </div>

        <div class="archive-projects-grid" id="archive-grid-root">
            </div>

        <div class="contact-cta-bar">
            <span>Interested in working together?</span>
            <a href="index.html#contact" class="btn-cta-contact">Contact Me <i class="fa-regular fa-envelope"></i></a>
        </div>

    </main>

    <footer>
        <div>&copy; 2026 Abhilash Saji. All rights reserved.</div>
        <div>Let's Build Something Amazing Together! 🚀</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Matrix floating nodes loading system configuration
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 900 } },
                "color": { "value": "#00ff66" }, 
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3.5, "random": true, "anim": { "enable": true, "speed": 1.5, "size_min": 0.8, "sync": false } },
                "line_linked": { "enable": false }, 
                "move": { "enable": true, "speed": 2, "direction": "top-right", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } },
            "retina_detect": true
        });

        let masterProjectsList = [];

        fetch('projects.json')
            .then(res => res.json())
            .then(data => {
                // Auto ascending ID number sorting alignment mechanism (1, 2, 3...)
                masterProjectsList = data.sort((a, b) => a.id - b.id);
                renderArchiveCards(masterProjectsList);
            })
            .catch(err => console.error("Error loading JSON dataset:", err));

        function renderArchiveCards(list) {
            const gridRoot = document.getElementById('archive-grid-root');
            
            gridRoot.innerHTML = list.map(proj => {
                const techList = proj.tech || ["Unity", "C#", "PC"];
                const badgesMarkup = techList.map(t => `<span class="badge-item">${t}</span>`).join('');

                let fallbackIcon = "fa-solid fa-gamepad";
                if(proj.category === "platformer") fallbackIcon = "fa-solid fa-tree";
                if(proj.category === "metroidvania") fallbackIcon = "fa-solid fa-dungeon";
                if(proj.category === "isometric") fallbackIcon = "fa-solid fa-layer-group";
                if(proj.category === "fps-tps") fallbackIcon = "fa-solid fa-crosshairs";
                if(proj.category === "mobile") fallbackIcon = "fa-solid fa-bolt";
                if(proj.category === "simulation") fallbackIcon = "fa-solid fa-car-side";
                if(proj.category === "ar-vr") fallbackIcon = "fa-solid fa-vr-cardboard";

                let chosenColor = proj.tagColor || "green";
                let tagClass = `tag-${chosenColor}`;
                let iconColorClass = `color-${chosenColor}`;

                return `
                    <div class="archive-card">
                        <div class="img-wrapper">
                            <span class="tag-badge ${tagClass}">${proj.tag}</span>
                            <img src="${proj.image}" alt="${proj.name}" onerror="this.src='https://via.placeholder.com/350x240/041219/ffffff?text=${proj.name}'">
                        </div>
                        <div class="info-panel">
                            <div class="title-row">
                                <h3 class="proj-name">${proj.name}</h3>
                                <i class="${fallbackIcon} ${iconColorClass} theme-icon"></i>
                            </div>
                            <p class="proj-desc">${proj.desc}</p>
                            
                            <div class="tech-badges-row">
                                ${badgesMarkup}
                            </div>
                            
                            <a href="project-details.html?id=${proj.id}" class="proj-link">VIEW PROJECT <i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterCategory(categoryKey, btnRef) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btnRef.classList.add('active');

            if(categoryKey === 'all') {
                renderArchiveCards(masterProjectsList);
            } else {
                const filtered = masterProjectsList.filter(p => p.category === categoryKey);
                renderArchiveCards(filtered);
            }
        }
    </script>
</body>
</html>
