<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects Archive | Abhilash Saji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #02080c;
            --bg-card: #041219;
            --primary-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #7d9096;
            --border-color: rgba(255, 255, 255, 0.05);
            --glow-color: rgba(0, 255, 102, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        /* --- REDESIGNED CLEAN HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 8%;
            background: rgba(2, 8, 12, 0.85);
            backdrop-filter: blur(16px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            letter-spacing: 1.5px;
        }
        .logo i { color: var(--primary-green); }

        .btn-go-back {
            background: var(--primary-green);
            color: var(--bg-dark);
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-go-back:hover {
            box-shadow: 0 0 20px var(--glow-color);
            transform: translateY(-1px);
        }

        /* --- MAIN SECTION CONTENT --- */
        .archive-section {
            padding: 150px 8% 40px 8%; 
        }

        .archive-flex-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 25px;
            margin-bottom: 40px;
        }

        .archive-title-area {
            width: 100%;
        }

        /* Added "MY WORK" subtitle back on track */
        .archive-subtitle {
            color: var(--primary-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .archive-main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .archive-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 750px;
        }

        /* --- OLDER METHOD FILTER BUTTONS (STATIC REVERTED) --- */
        .filter-buttons-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 22px;
        }

        .btn-filter {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.08); /* Older uniform boundary setup */
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-filter i { font-size: 0.85rem; color: var(--text-muted); }

        /* Highlight Color configuration only impacts Active / Hover states as requested */
        .btn-filter[data-cat="all"]:hover, .btn-filter[data-cat="all"].active { border-color: #00ff66; color: #00ff66; background: rgba(0, 255, 102, 0.02); }
        .btn-filter[data-cat="all"]:hover i, .btn-filter[data-cat="all"].active i { color: #00ff66; }

        .btn-filter[data-cat="platformer"]:hover, .btn-filter[data-cat="platformer"].active { border-color: #00ffbc; color: #00ffbc; background: rgba(0, 255, 188, 0.02); }
        .btn-filter[data-cat="platformer"]:hover i, .btn-filter[data-cat="platformer"].active i { color: #00ffbc; }

        .btn-filter[data-cat="metroidvania"]:hover, .btn-filter[data-cat="metroidvania"].active { border-color: #bb55ff; color: #bb55ff; background: rgba(187, 85, 255, 0.02); }
        .btn-filter[data-cat="metroidvania"]:hover i, .btn-filter[data-cat="metroidvania"].active i { color: #bb55ff; }

        .btn-filter[data-cat="isometric"]:hover, .btn-filter[data-cat="isometric"].active { border-color: #33a6ff; color: #33a6ff; background: rgba(51, 166, 255, 0.02); }
        .btn-filter[data-cat="isometric"]:hover i, .btn-filter[data-cat="isometric"].active i { color: #33a6ff; }

        .btn-filter[data-cat="fps-tps"]:hover, .btn-filter[data-cat="fps-tps"].active { border-color: #ff3344; color: #ff3344; background: rgba(255, 51, 68, 0.02); }
        .btn-filter[data-cat="fps-tps"]:hover i, .btn-filter[data-cat="fps-tps"].active i { color: #ff3344; }

        .btn-filter[data-cat="mobile"]:hover, .btn-filter[data-cat="mobile"].active { border-color: #ff9900; color: #ff9900; background: rgba(255, 153, 0, 0.02); }
        .btn-filter[data-cat="mobile"]:hover i, .btn-filter[data-cat="mobile"].active i { color: #ff9900; }

        .btn-filter[data-cat="simulation"]:hover, .btn-filter[data-cat="simulation"].active { border-color: #00ff66; color: #00ff66; background: rgba(0, 255, 102, 0.02); }
        .btn-filter[data-cat="simulation"]:hover i, .btn-filter[data-cat="simulation"].active i { color: #00ff66; }

        .btn-filter[data-cat="ar-vr"]:hover, .btn-filter[data-cat="ar-vr"].active { border-color: #2196F3; color: #2196F3; background: rgba(33, 150, 243, 0.02); }
        .btn-filter[data-cat="ar-vr"]:hover i, .btn-filter[data-cat="ar-vr"].active i { color: #2196F3; }

        /* --- PROJECTS CARDS GRID --- */
        .archive-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .archive-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: border-color 0.3s ease;
        }

        .archive-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            height: 240px;
            background-color: #061822;
            overflow: hidden;
        }

        .tag-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(2, 8, 12, 0.9);
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 10;
            opacity: 1 !important;
            letter-spacing: 0.5px;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Dynamic Border Tags Allocation */
        .tag-green { border: 1px solid #00ff66; color: #00ff66; }
        .tag-purple { border: 1px solid #bb55ff; color: #bb55ff; }
        .tag-blue { border: 1px solid #33a6ff; color: #33a6ff; }
        .tag-orange { border: 1px solid #ff9900; color: #ff9900; }
        .tag-red { border: 1px solid #ff3344; color: #ff3344; }

        .info-panel {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .proj-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
        }

        .theme-icon { font-size: 1.1rem; }

        /* Icon Colors */
        .color-green { color: #00ff66; }
        .color-purple { color: #bb55ff; }
        .color-blue { color: #33a6ff; }
        .color-orange { color: #ff9900; }
        .color-red { color: #ff3344; }

        .proj-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 22px;
            flex-grow: 1;
        }

        .tech-badges-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 22px;
            padding-top: 5px;
        }

        .badge-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .proj-link {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary-green);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: auto;
            letter-spacing: 0.5px;
        }

        /* --- BOTTOM CTA BAR --- */
        .contact-cta-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 40px;
        }

        .btn-cta-contact {
            border: 1px solid var(--primary-green);
            background: transparent;
            color: var(--primary-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 10px 22px;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-cta-contact:hover {
            background: var(--primary-green);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--glow-color);
        }

        /* --- FOOTER REGION --- */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding: 35px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: #02080c;
        }

        @media (max-width: 968px) {
            .archive-flex-header { align-items: center; text-align: center; }
            .filter-buttons-row { justify-content: center; }
            header { padding: 15px 4%; }
            footer { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-gamepad"></i> ABHILASH SAJI
        </div>
        <div class="header-btn-area">
            <a href="index.html" class="btn-go-back"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
        </div>
    </header>

    <main class="archive-section">
        
        <div class="archive-flex-header">
            <div class="archive-title-area">
                <div class="archive-subtitle">MY WORK</div>
                <h1 class="archive-main-title">All Projects</h1>
                <p class="archive-desc">
                    Explore a collection of games I've designed and developed using Unity and C#. Filter down by specific structural sub-genres.
                </p>
            </div>
            
            <div class="filter-buttons-row">
                <button class="btn-filter active" data-cat="all" onclick="filterCategory('all', this)"><i class="fa-solid fa-table-cells"></i> All</button>
                <button class="btn-filter" data-cat="platformer" onclick="filterCategory('platformer', this)"><i class="fa-solid fa-tree"></i> Platformers</button>
                <button class="btn-filter" data-cat="metroidvania" onclick="filterCategory('metroidvania', this)"><i class="fa-solid fa-dungeon"></i> Metroidvanias</button>
                <button class="btn-filter" data-cat="isometric" onclick="filterCategory('isometric', this)"><i class="fa-solid fa-layer-group"></i> Isometric</button>
                <button class="btn-filter" data-cat="fps-tps" onclick="filterCategory('fps-tps', this)"><i class="fa-solid fa-crosshairs"></i> FPS & TPS</button>
                <button class="btn-filter" data-cat="mobile" onclick="filterCategory('mobile', this)"><i class="fa-solid fa-mobile-screen-button"></i> Mobile</button>
                <button class="btn-filter" data-cat="simulation" onclick="filterCategory('simulation', this)"><i class="fa-solid fa-car-side"></i> Simulation</button>
                <button class="btn-filter" data-cat="ar-vr" onclick="filterCategory('ar-vr', this)"><i class="fa-solid fa-vr-cardboard"></i> AR & VR</button>
            </div>
        </div>

        <div class="archive-projects-grid" id="archive-grid-root">
            </div>

        <div class="contact-cta-bar">
            <span>Interested in working together?</span>
            <a href="index.html#contact" class="btn-cta-contact">Contact Me <i class="fa-regular fa-envelope"></i></a>
        </div>

    </main>

    <footer>
        <div>&copy; 2026 Abhilash Saji. All rights reserved.</div>
        <div>Let's Build Something Amazing Together! 🚀</div>
    </footer>

    <script>
        let masterProjectsList = [];

        fetch('projects.json')
            .then(res => res.json())
            .then(data => {
                masterProjectsList = data.sort((a, b) => a.id - b.id);
                renderArchiveCards(masterProjectsList);
            })
            .catch(err => console.error("Error loading JSON:", err));

        function renderArchiveCards(list) {
            const gridRoot = document.getElementById('archive-grid-root');
            
            gridRoot.innerHTML = list.map(proj => {
                const techList = proj.tech || ["Unity", "C#", "PC"];
                const badgesMarkup = techList.map(t => `<span class="badge-item">${t}</span>`).join('');

                let fallbackIcon = "fa-solid fa-gamepad";
                if(proj.category === "platformer") fallbackIcon = "fa-solid fa-tree";
                if(proj.category === "metroidvania") fallbackIcon = "fa-solid fa-dungeon";
                if(proj.category === "isometric") fallbackIcon = "fa-solid fa-layer-group";
                if(proj.category === "fps-tps") fallbackIcon = "fa-solid fa-crosshairs";
                if(proj.category === "mobile") fallbackIcon = "fa-solid fa-bolt";
                if(proj.category === "simulation") fallbackIcon = "fa-solid fa-car-side";
                if(proj.category === "ar-vr") fallbackIcon = "fa-solid fa-vr-cardboard";

                let chosenColor = proj.tagColor || "green";
                let tagClass = `tag-${chosenColor}`;
                let iconColorClass = `color-${chosenColor}`;

                return `
                    <div class="archive-card">
                        <div class="img-wrapper">
                            <span class="tag-badge ${tagClass}">${proj.tag}</span>
                            <img src="${proj.image}" alt="${proj.name}" onerror="this.src='https://via.placeholder.com/350x240/041219/ffffff?text=${proj.name}'">
                        </div>
                        <div class="info-panel">
                            <div class="title-row">
                                <h3 class="proj-name">${proj.name}</h3>
                                <i class="${fallbackIcon} ${iconColorClass} theme-icon"></i>
                            </div>
                            <p class="proj-desc">${proj.desc}</p>
                            
                            <div class="tech-badges-row">
                                ${badgesMarkup}
                            </div>
                            
                            <a href="#" class="proj-link">VIEW PROJECT <i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterCategory(categoryKey, btnRef) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btnRef.classList.add('active');

            if(categoryKey === 'all') {
                renderArchiveCards(masterProjectsList);
            } else {
                const filtered = masterProjectsList.filter(p => p.category === categoryKey);
                renderArchiveCards(filtered);
            }
        }
    </script>
</body>
</html>
